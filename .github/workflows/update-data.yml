name: Auto-update data.json

on:
  schedule:
    # London session + NY overlap: 07:00-19:00 CEST = 05:00-17:00 UTC
    # Óránként, hétköznapokon
    - cron: '0 5 * * 1-5'   # 07:00 CEST
    - cron: '0 6 * * 1-5'   # 08:00 CEST
    - cron: '48 6 * * 1-5'  # 08:48 CEST  ← reggeli deep research trigger
    - cron: '0 7 * * 1-5'   # 09:00 CEST  ← London open
    - cron: '0 8 * * 1-5'   # 10:00 CEST
    - cron: '0 9 * * 1-5'   # 11:00 CEST
    - cron: '0 10 * * 1-5'  # 12:00 CEST
    - cron: '0 11 * * 1-5'  # 13:00 CEST
    - cron: '0 12 * * 1-5'  # 14:00 CEST  ← NY overlap kezdet
    - cron: '0 13 * * 1-5'  # 15:00 CEST
    - cron: '0 14 * * 1-5'  # 16:00 CEST
    - cron: '0 15 * * 1-5'  # 17:00 CEST
    - cron: '0 16 * * 1-5'  # 18:00 CEST
    - cron: '0 17 * * 1-5'  # 19:00 CEST  ← NY overlap vége
  workflow_dispatch:         # Manuális trigger is elérhető

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run fetch script
        run: python scripts/fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: data update $(date +'%Y-%m-%d %H:%M UTC')"
          git push
