name: Auto-update market data

on:
  schedule:
    # 10 percenként, hétköznap 07:00–20:00 CEST (05:00–18:00 UTC)
    - cron: '*/10 5-18 * * 1-5'
  workflow_dispatch:

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('scripts/*.py') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance requests jsonschema

      - name: Fetch + commit + push (retry on conflict)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            echo "=== iteration $i ==="
            # Mindig a legfrisebb main-re szinkronizálunk, hogy a generátor
            # a legújabb data.json-on dolgozzon (megőrzi a többi workflow mezőit).
            git fetch origin main
            git reset --hard origin/main

            # Generátorok futtatása a friss adatokon (load-modify-save: setups megmarad)
            python scripts/fetch_data.py
            python scripts/fetch_calendar.py || echo "[warn] calendar fetch failed"
            python scripts/fetch_fedwatch.py || echo "[warn] fedwatch fetch failed"
            python scripts/fetch_intraday.py || echo "[warn] intraday fetch failed"

            # Séma validáció
            python scripts/validate_data.py

            git add data.json cache/ 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "[commit] nincs változás, skip"
              exit 0
            fi
            git commit -m "data: refresh $(date +'%Y-%m-%d %H:%M UTC')"

            if git push origin main; then
              echo "[push] sikeres ($i. próba)"
              exit 0
            fi
            echo "[push] $i. próba elbukott (másik workflow is írt közben) — újrapróbálkozás friss main-nel..."
            sleep 3
          done
          echo "[push] 5 próba után is sikertelen"
          exit 1
