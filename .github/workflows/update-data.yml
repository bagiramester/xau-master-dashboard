name: Auto-update data.json + AI

on:
  schedule:
    # 10 percenként, hétköznap 07:00–20:00 CEST (05:00–18:00 UTC)
    - cron: '*/10 5-18 * * 1-5'
  workflow_dispatch:       # Manuális trigger

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('scripts/*.py') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance requests jsonschema

      - name: Fetch base market data (XAU/US10Y/DXY/F&G)
        run: python scripts/fetch_data.py

      - name: Fetch economic calendar
        run: python scripts/fetch_calendar.py || echo "[warn] calendar fetch failed, continuing"

      - name: Fetch FedWatch
        run: python scripts/fetch_fedwatch.py || echo "[warn] fedwatch fetch failed, continuing"

      - name: Fetch intraday XAU + Asia H/L
        run: python scripts/fetch_intraday.py || echo "[warn] intraday fetch failed, continuing"

      - name: Run AI analysis (Bagira)
        env:
          PPLX_API_KEY: ${{ secrets.BAGIRA_XAU_MASTER }}
          MOCK_AI: ${{ secrets.BAGIRA_XAU_MASTER == '' && 'true' || '' }}
        run: python scripts/ai_analyze.py || echo "[warn] AI analyze failed, continuing"

      - name: Validate data.json against schema
        run: python scripts/validate_data.py

      - name: Commit and push data.json + cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json cache/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "[commit] nincs változás, skip"
            exit 0
          fi
          git commit -m "auto: refresh $(date +'%Y-%m-%d %H:%M UTC')"
          # Konfliktus-safe push: 3× próbálkozás rebase-el
          for i in 1 2 3; do
            git push && exit 0
            echo "[push] $i. próba failed, rebase..."
            git pull --rebase --autostash || true
            sleep 2
          done
          echo "[push] 3× sikertelen, feladás"
          exit 1
