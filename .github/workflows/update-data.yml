name: Auto-update data.json

on:
  schedule:
    # 15 percenként, hétköznap 07:00–20:00 CEST (05:00–18:00 UTC)
    # 4 futás óránként, minden negyed órában
    - cron: '*/15 5-18 * * 1-5'
  workflow_dispatch:        # Manuális trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests jsonschema

      - name: Fetch fresh data
        run: python scripts/fetch_data.py

      - name: Validate data.json against schema
        run: python scripts/validate_data.py

      - name: Commit and push data.json (ha változott)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: data.json refresh $(date +'%Y-%m-%d %H:%M UTC')"
          git push
