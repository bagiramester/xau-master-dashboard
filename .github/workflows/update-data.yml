name: Auto-update data.json

on:
  schedule:
    # Minden hétkoznap 07:30 CEST (05:30 UTC)
    - cron: '30 5 * * 1-5'
  workflow_dispatch:  # Manuális futtatás is lehetséges

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run fetch script
        run: python scripts/fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: daily data update $(date +'%Y-%m-%d %H:%M UTC')"
          git push
