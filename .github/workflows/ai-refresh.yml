name: Refresh Bagira AI

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Ok az AI trigger-hez (opcionális)'
        required: false
        default: 'manual trigger'

concurrency:
  group: ai-refresh
  cancel-in-progress: true

jobs:
  ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('scripts/*.py') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests jsonschema json5 json-repair

      - name: AI analysis + commit + push (retry on conflict)
        env:
          PPLX_API_KEY: ${{ secrets.BAGIRA_XAU_MASTER }}
          MOCK_AI: ${{ secrets.BAGIRA_XAU_MASTER == '' && 'true' || '' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            echo "=== iteration $i ==="
            # Mindig a legfrisebb main-re szinkronizálunk, hogy az AI a legújabb
            # market adatokon dolgozzon (ai_analyze.py megőrzi a macro/levels/risk mezőket).
            git fetch origin main
            git reset --hard origin/main

            # AI elemzés futtatása a friss data.json-on
            python scripts/ai_analyze.py

            # Séma validáció
            python scripts/validate_data.py

            git add data.json
            if git diff --cached --quiet; then
              echo "[commit] AI nem változtatott a data.json-on, skip"
              exit 0
            fi
            git commit -m "ai: Bagira analysis $(date +'%Y-%m-%d %H:%M UTC') — trigger: ${{ github.event.inputs.note || 'manual' }}"

            if git push origin main; then
              echo "[push] sikeres ($i. próba)"
              exit 0
            fi
            echo "[push] $i. próba elbukott (másik workflow is írt közben) — újrapróbálkozás friss main-nel..."
            sleep 3
          done
          echo "[push] 5 próba után is sikertelen"
          exit 1
