name: Refresh Bagira AI

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Ok az AI trigger-hez (opcionális)'
        required: false
        default: 'manual trigger'

concurrency:
  group: ai-refresh
  cancel-in-progress: true

jobs:
  ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('scripts/*.py') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests jsonschema

      - name: Run Bagira AI analysis
        env:
          PPLX_API_KEY: ${{ secrets.BAGIRA_XAU_MASTER }}
          MOCK_AI: ${{ secrets.BAGIRA_XAU_MASTER == '' && 'true' || '' }}
        run: python scripts/ai_analyze.py

      - name: Validate data.json against schema
        run: python scripts/validate_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "[commit] AI nem változtatott a data.json-on, skip"
            exit 0
          fi
          git commit -m "ai: Bagira analysis $(date +'%Y-%m-%d %H:%M UTC') — trigger: ${{ github.event.inputs.note || 'manual' }}"
          for i in 1 2 3; do
            git push && exit 0
            echo "[push] $i. próba failed, rebase..."
            git pull --rebase --autostash || true
            sleep 2
          done
          exit 1
